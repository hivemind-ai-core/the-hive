name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check code formatting
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - name: Check formatting
        run: cargo fmt --check

  # Run clippy lints
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  # Build the project
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - name: Build
        run: cargo build --workspace --release

  # Run tests
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-action@stable
      - name: Run tests
        run: cargo test --workspace

  # Build Docker images
  docker:
    name: Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build hive-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.hive-server
          push: false
          tags: hive-server:latest
      - name: Build hive-agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.hive-agent
          push: false
          tags: hive-agent:latest
      - name: Build app-container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.app-container
          push: false
          tags: app-container:latest
